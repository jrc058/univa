<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Univa</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>UNIVA</h1>
      <span class="subtitle">A Game of Scale</span>
      <div id="status"></div>
    </header>
    <main>
      <div id="sidebar">
        <h2>Universes</h2>
        <button id="create-btn">Create Universe</button>
        <ul id="universe-list"></ul>
      </div>
      <div id="map-container">
        <canvas id="map"></canvas>
      </div>
      <div id="detail-panel">
        <h2 id="detail-title">Select a node</h2>
        <div id="detail-content"></div>
      </div>
    </main>
  </div>
  <script src="/js/app.js" type="module"></script>
</body>
</html>
